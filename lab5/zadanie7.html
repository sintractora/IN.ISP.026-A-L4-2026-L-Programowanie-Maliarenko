<body>

    <h1>Zadanie 7 </h1>
    <script>
        function decToHex(liczba) {
            let znaki = "0123456789ABCDEF";
           
        let wynik = "";
            if(liczba === 0) return "0";
          
            
            while(liczba > 0) {
                let reszta = liczba % 16;
                wynik = znaki[reszta] + wynik;
                liczba = Math.floor(liczba / 16);
            }
    
        console.log(wynik);
}
        
    decToHex(255);


    </script>
</body>
</html>
