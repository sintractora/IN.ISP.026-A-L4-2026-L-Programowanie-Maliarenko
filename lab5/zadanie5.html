    <h1>Zadanie 5</h1>
    <script>
        function ciagPi(n) {
            let suma = 0;
            let mianownik = 1;
            let znak = 1;
            
            for(let i = 0; i < n; i++) {
                suma += znak * (1/mianownik);
                znak = znak * -1;
                mianownik += 2;
            }
            console.log(4 * suma);
        }
        
        
        ciagPi(100);

    </script>
